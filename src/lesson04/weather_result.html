<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Weather Result for {city_name}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title text-primary">Weather Result</h1>
                <h2 class="h4">{city_name}</h2>
                {result_html}
                <a href="/" class="btn btn-outline-secondary mt-3">← Select another city</a>
            </div>
        </div>
    </div>
</body>
</html>
